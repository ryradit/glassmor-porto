<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Glowing neon gradient -->
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <!-- Subtle glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer orbital ring representing Earth space orbit -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="url(#neonGradient)" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.8" />
  
  <!-- Outer glowing circle -->
  <circle cx="16" cy="16" r="11.5" fill="none" stroke="url(#neonGradient)" stroke-width="1" opacity="0.4" />
  
  <!-- Earth Grid Latitudes & Longitudes representing Earth-X -->
  <path d="M 16 4.5 A 11.5 11.5 0 0 1 16 27.5 A 11.5 11.5 0 0 1 16 4.5 Z" fill="none" stroke="url(#neonGradient)" stroke-width="0.5" opacity="0.3" />
  <path d="M 4.5 16 A 11.5 11.5 0 0 1 27.5 16 A 11.5 11.5 0 0 1 4.5 16 Z" fill="none" stroke="url(#neonGradient)" stroke-width="0.5" opacity="0.3" />
  <line x1="4.5" y1="16" x2="27.5" y2="16" stroke="url(#neonGradient)" stroke-width="0.5" opacity="0.3" />
  <line x1="16" y1="4.5" x2="16" y2="27.5" stroke="url(#neonGradient)" stroke-width="0.5" opacity="0.3" />
  
  <!-- Central AI 'X' representing Earth-X AI Playground -->
  <!-- Sleek cybernetic cross -->
  <path d="M 10 10 L 22 22 M 22 10 L 10 22" stroke="url(#neonGradient)" stroke-width="3" stroke-linecap="round" filter="url(#glow)" />
  
  <!-- Center core dot of AI intelligence -->
  <circle cx="16" cy="16" r="2" fill="#ffffff" />
</svg>
